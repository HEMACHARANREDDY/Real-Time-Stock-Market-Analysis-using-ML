<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <title>S Pulse - Sector Heatmap</title>
    <meta name="description" content="Visual sector heatmap showing real-time performance of major market sectors and individual stocks.">
    <script>(function(){document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'dark');})();</script>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/header.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    {% include 'shared/header.html' %}

    <div class="main-content-wrapper">
        <div class="main-content">
            <div class="page-header">
                <div>
                    <h2 class="page-title">Sector Heatmap</h2>
                    <span class="page-subtitle" id="currentDate"></span>
                </div>
                <div class="page-actions">
                    <div class="period-selector">
                        <button class="period-btn" data-period="1d" data-active="true">1D</button>
                        <button class="period-btn" data-period="1wk">1W</button>
                        <button class="period-btn" data-period="1mo">1M</button>
                        <button class="period-btn" data-period="3mo">3M</button>
                    </div>
                    <button class="btn-icon" id="refreshBtn" title="Refresh Heatmap">
                        <i class="fas fa-sync-alt"></i>
                    </button>
                </div>
            </div>

            <div class="page-hero-strip research">
                <div class="page-hero-content">
                    <div class="page-hero-title">Sector Strength Map</div>
                    <div class="page-hero-subtitle">Spot winning and lagging sectors instantly with bold tiles and aligned data blocks.</div>
                </div>
            </div>

            <!-- Sector Summary Cards -->
            <div class="quick-stats" id="sectorSummary">
                <div class="stat-card glass-card">
                    <div class="stat-icon green"><i class="fas fa-arrow-trend-up"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Top Sector</span>
                        <span class="stat-value" id="statTopSector">--</span>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon red"><i class="fas fa-arrow-trend-down"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Worst Sector</span>
                        <span class="stat-value" id="statWorstSector">--</span>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon blue"><i class="fas fa-trophy"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Top Gainer</span>
                        <span class="stat-value" id="statTopStock">--</span>
                    </div>
                </div>
                <div class="stat-card glass-card">
                    <div class="stat-icon orange"><i class="fas fa-layer-group"></i></div>
                    <div class="stat-info">
                        <span class="stat-label">Sectors Tracked</span>
                        <span class="stat-value" id="statSectorCount">6</span>
                    </div>
                </div>
            </div>

            <!-- Heatmap Grid -->
            <div id="heatmapContainer" class="glass-card" style="padding:1.5rem;margin-bottom:1.5rem;">
                <div class="card-header" style="margin-bottom:1rem;">
                    <h3><i class="fas fa-fire" style="color:#f59e0b;"></i> Sector Performance</h3>
                    <div style="display:flex;align-items:center;gap:1rem;">
                        <div style="display:flex;align-items:center;gap:0.4rem;font-size:0.78rem;color:var(--text-secondary);">
                            <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#ef4444;"></span> Decline
                            <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#374151;margin-left:0.4rem;"></span> Flat
                            <span style="display:inline-block;width:14px;height:14px;border-radius:3px;background:#10b981;margin-left:0.4rem;"></span> Gain
                        </div>
                    </div>
                </div>
                <div id="heatmapGrid" style="display:grid;gap:1rem;">
                    <div style="text-align:center;padding:3rem;color:var(--text-secondary);">
                        <div class="spinner"></div>
                        <span style="display:block;margin-top:0.75rem;">Loading sector data…</span>
                    </div>
                </div>
            </div>

            <!-- Sector Detail Expanded (populated by JS when user clicks a sector) -->
            <div id="sectorDetail" class="glass-card" style="padding:1.5rem;display:none;">
                <div class="card-header" style="margin-bottom:1rem;">
                    <h3 id="sectorDetailTitle">Sector Detail</h3>
                    <button class="btn-icon" id="closeSectorDetail" title="Close"><i class="fas fa-times"></i></button>
                </div>
                <div id="sectorDetailBody"></div>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast-container" id="toastContainer"></div>

    <script src="/static/js/header.js"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}?v={{ asset_version }}"></script>
    <script src="/static/js/heatmap.js"></script>
</body>
</html>
